  "trade_web/frontend/src/pages/observatory/",
  "trade_web/frontend/src/components/observatory/",
  "trade_web/frontend/src/lib/observatory.ts",
]
contracts = [
  "three independent formal/evaluated_candidate/observed layers",
  "read-only /api/v1/observatory client contract",
]
failure_states = [
  "loading",
  "unavailable",
  "failed request",
  "PIT_NOT_PROVEN",
  "snapshot selector mismatch",
  "stale previous evidence",
  "candidate not formally published",
  "date evidence unavailable",
