]

[[findings]]
id = "TRADE-DATA-001"
priority = "P0"
severity = "HIGH"
consensus_count = 1
status = "resolved"
resolution = "Formal point-in-time and revision semantics are an independently validated prerequisite; formal snapshots and Studies fail closed without required clocks, policy identities, and revision mappings."
evidence = [
  "specs/dataset-product-lifecycle/spec.md:Formal PIT and revision semantics SHALL be proven before formal use",
  "specs/study-lifecycle/spec.md:Studies SHALL run only from immutable Dataset snapshots",
  "tasks.md:2.4",
]

[[findings]]
id = "TRADE-REL-001"
priority = "P0"
severity = "HIGH"
consensus_count = 1
status = "resolved"
resolution = "Platform now defines durable ordered delivery and verified restore activation: OrderingContract prevents N plus one from applying before N, and RestoreOperation fences writers, atomically activates, rebinds runtimes, verifies health, and rolls back safely."
evidence = [
  "specs/platform-foundation/spec.md:Ordered delivery SHALL use a durable OrderingContract",
  "specs/migration-governance/spec.md:Restorable backups SHALL be verified before activation",
  "tasks.md:2.3",
  "tasks.md:3.4",
]

