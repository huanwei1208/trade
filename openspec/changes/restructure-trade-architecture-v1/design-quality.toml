schema_version = 1
policy_version = "v1"

[[impacts]]
id = "public_contract"
applies = true
reason = "The architecture preserves and progressively redirects the public Bash CLI, Python CLI, FastAPI and SSE routes, React BFF payloads, SDK, notebooks, schedules and event entries through versioned compatibility adapters."

[[impacts]]
id = "persistent_write"
applies = true
reason = "Future context-owned repositories, immutable artifact receipts, release pointers, audit records and outbox transitions replace cross-domain write ownership while retaining authoritative history and rollback evidence."

[[impacts]]
id = "schema_migration"
applies = true
reason = "Logical ownership of the existing shared SQLite tables and durable artifacts moves to context-owned repositories through additive versioned migrations, compatibility readers and reversible cutovers."

[[impacts]]
id = "point_in_time"
applies = true
reason = "Datasets formalizes event, observed, available, first-seen and revision time, immutable snapshots and fail-closed point-in-time resolution for downstream research and decision support."

[[impacts]]
id = "predictive_model"
applies = true
reason = "Studies formalizes hypothesis registration, feature and label definitions, deterministic validation, promotion, stale-result propagation and explicit unavailable outcomes for model or research results."

[[impacts]]
id = "external_event_data"
applies = true
reason = "Capture formalizes pull, push, stream, import, replay, backfill and revision processing for provider data with durable request identity, source provenance, rate limits, receipts and checkpoints."

[[impacts]]
id = "runtime_concurrency"
applies = true
reason = "Process Managers, outbox delivery, schedules, provider concurrency limits, retries, deadlines, idempotency and recovery introduce durable non-linear workflow coordination."

[evidence.contract]
contract = "Stable external contracts are the root trade CLI command and legacy aliases, existing FastAPI and SSE routes, current React page DTOs, Observatory read-only query surfaces, SDK and notebook entry points, scheduler command envelopes and durable event identities; new contracts are versioned immutable refs, commands, past-tense events, query DTOs and capability interfaces."
consumers = "Researchers, operators, React pages, shell scripts, notebook users, existing Python callers, EventBus and scheduler handlers, future SDK, MCP, GraphQL, TUI and remote-worker adapters consume the retained interfaces or their compatibility adapters."
compatibility = "Existing command names, routes, methods, parameters, status codes, response/error shapes, SSE semantics, page URL/local state and data artifacts remain readable during the migration window; compatibility adapters resolve legacy aliases to immutable references and add fields only under versioned snapshot policy."
migration = "Child changes establish CLI/OpenAPI/SSE/Web contract snapshots before delegation, retain old import paths and table readers through adapters, use dual-read comparison or readiness-gated pointer switches, and publish individual retirement criteria rather than deleting surfaces during a directory move."
rollback = "A failed child disables its new adapter or process command, restores the previous compatible reader or release pointer, keeps immutable artifacts and audit history readable, and rebuilds projections without deleting records."

[evidence.storage]
authoritative_writer = "Capture owns raw receipts, SourceManifest rights and checkpoints; Datasets owns versions, snapshots, canonicalization/quality/derivation policy, lineage and releases; Studies owns registered runs and results; Decision Support owns decision cases; Platform Events owns ingress/outbox/inbox/delivery/DLQ mechanics; Platform Execution owns generic execution receipts; Processes owns cross-context process state."
idempotency_key = "Capture uses source and request identity plus payload digest or revision identity; Dataset builds use declared immutable input-ref and build-policy digest; Studies use study-spec, snapshot-ref and deterministic-run key; processes use process type plus correlation scope and idempotency key; events use durable event and consumer identity."
concurrency_control = "The Platform foundation provides local transaction/outbox, durable ingress idempotency, inbox claim, delivery lease/ack and bounded DLQ mechanics before Context extraction. Source/credential scoped admission and checkpoint ownership protect Capture, release generation compare-and-swap protects Datasets, deterministic study keys protect Studies, and process claims protect long-running coordination."
staging_validation = "Capture verifies SourceManifest rights/temporal policy, receipt metadata and content digest through stage/digest/commit-marker/receipt reconciliation; Datasets validates schema, units, policy refs, temporal fields, duplicates, reconciliation, physical layout and quality before candidate state; Studies validate proven pinned snapshot lineage and registered specification before execution; decisions validate referenced evidence and expiry policy."
atomic_visibility = "A Context state transition, audit receipt and outbox record become visible in one local durable transaction through the Platform foundation. Artifact bytes become referenceable only after digest verification and immutable commit marker. Release pointers are projection materializations of one generation-stamped Datasets authority and advance only after the referenced immutable version has passed its declared publication checks."
crash_windows = "Crash recovery resumes from durable CaptureRun, DatasetBuild, StudyRun and Process records; prepared/orphaned/receipt-mismatched artifacts reconcile deterministically; unacknowledged outbox events redeliver through inbox/lease/ack idempotency; current-pointer changes retain prior generation evidence; a replay never substitutes a moving latest alias for the recorded immutable input."
corrupt_predecessor = "A corrupt or hash-mismatched predecessor artifact, SQLite record or projection produces an explicit unavailable, quarantined or failed state and preserves diagnostic references; recovery rebuilds only replaceable projections or restores a verified prior generation."
partial_results = "Multi-source captures and Dataset builds record every required input and may finish partial, unavailable or quarantined; partial results are not published as formal snapshots. Study insufficient-data and stale result states remain explicit and never become zero-valued successful evidence."
reader_consistency = "Readers use context query handles and immutable artifact refs or rebuildable projections. Catalogs, current pointers and UI snapshots are projections rather than authorities, and query paths cannot repair, fetch, publish or move a lifecycle pointer."
backup_hash_verification = "Platform Backup stores a manifest with SHA-256 per archive/member, rejects unsafe archive members, verifies a staged temporary root before activation and writes an append-only restore receipt; context migration rehearsals verify table rows, artifact digests and release references before and after a temporary-root rollback."
small_sample_verification = "Temporary fixtures exercise one-to-many and many-to-one lineage, stream segments, duplicate commands, outbox crash recovery, missing time clocks, source disagreement, supersession, pointer rollback, study rerun and projection rebuild before any cutover."
rollback = "Rollback switches a context compatibility reader or release pointer to the verified prior generation, retains newer immutable records for audit, replays pending outbox safely and rebuilds projections; it does not erase durable facts or run a shared cross-context transaction."
audit_trail = "Capture receipts include SourceManifest rights/policy and temporal/finality evidence; Dataset lineage includes canonicalization/quality/derivation policy; Study validation and promotion receipts, Decision Support audit trails, process records, outbox delivery/DLQ and execution receipts retain correlation, causation, idempotency, actor, policy and safe error evidence without raw credential leakage."

[evidence.migration]
compatibility_modes = ["backward", "forward"]
dual_read_write = true

[evidence.migration.versioning]
strategy = "additive_version"
old_version_preserved = true

[evidence.migration.backfill]
mode = "idempotent_replay"
destructive = false
checkpointed = true

[evidence.migration.cutover]
strategy = "dual_read_compare"
readiness_gate = true

[evidence.migration.rollback]
supported = true
restore_source = "previous_generation"

[evidence.migration.legacy_retirement]
after_compatibility_window = true
minimum_window_days = 30

[evidence.forecast]
decision_time = { source = "decision_clock", fallback = "explicit_unavailable", timezone = "UTC", confidence = "exact" }
event_time = { source = "source_event_time", fallback = "explicit_unavailable", timezone = "UTC", confidence = "exact" }
publication_time = { source = "source_publication_time", fallback = "explicit_unavailable", timezone = "UTC", confidence = "exact" }
first_seen_time = { source = "collector_first_seen_time", fallback = "explicit_unavailable", timezone = "UTC", confidence = "exact" }
available_time = { source = "policy_available_time", fallback = "explicit_unavailable", timezone = "UTC", confidence = "exact" }
revision_time = { source = "source_revision_time", fallback = "explicit_unavailable", timezone = "UTC", confidence = "exact" }
timezone = "UTC is the storage and comparison timezone; source-local timezone metadata is retained in capture and dataset contracts."
knowledge_mode = "market_available and installation_observed are explicit snapshot policies selected by Dataset resolution rather than inferred from a reader."
revision_policy = "as_known selects immutable historical evidence; latest_restated is an explicitly non-PIT transformation that requires a real revision mapping and never rewrites as_known history."
universe_policy = "Each StudySpec pins an eligible universe through DatasetSnapshotRef lineage and records exclusions, coverage state and any permitted sample policy."
coverage_state = "partial"
label_maturity = "pending"
leakage_tests = "PIT goldens verify event, publication, first-seen, available and revision clocks; missing required clocks block formal visibility, future revisions remain absent from as_known views, and Study runs reject moving aliases."
evidence_identity = "Formal evidence identity is the immutable DatasetSnapshotRef digest plus constituent version refs, effective knowledge cut, revision policy, StudySpec version and result/validation digest."
oos_population = "Each promoted StudySpec declares the snapshot-pinned eligible out-of-sample population and retains excluded or unavailable records as explicit coverage evidence."
oos_window = "Each StudySpec records a finite walk-forward or held-out window derived from immutable snapshot clocks and reports unavailable when that window cannot be formed."
horizon = "A StudySpec declares its evaluation horizon and label maturity policy; a result remains pending or insufficient rather than synthesizing an unobserved future label."
method = "Registered study methods include preregistration, feature and label definitions, benchmark, placebo, walk-forward validation and multiple-testing correction where applicable."
metrics = "ValidationReport records declared metrics, baseline comparison, sample counts, uncertainty and regime slices with a result identity tied to immutable input snapshots."
sample_count = 1
uncertainty = "Study results carry method-appropriate uncertainty and coverage limits; a missing calculation reports explicit unavailable rather than a confidence-looking default."
regime_slices = "StudySpec records declared regime slices or explicit unavailable evidence; post-hoc segmentation is not silently promoted as formal validation."
baseline = "Each StudySpec identifies a snapshot-pinned benchmark or null baseline before result promotion."
calibration_lifecycle = "uncalibrated"
promotion_criteria = "Promotion requires a validated immutable StudyResult with preregistered criteria, complete lineage, explicit coverage and a PromotionReceipt; it does not make a trade execution claim."
unavailable_state = "blocked"
no_numeric_fallback = true

[evidence.external_event]
event_time = { source = "source_event_time", fallback = "explicit_unavailable", timezone = "UTC", confidence = "exact" }
publication_time = { source = "source_publication_time", fallback = "explicit_unavailable", timezone = "UTC", confidence = "exact" }
first_seen_time = { source = "collector_first_seen_time", fallback = "explicit_unavailable", timezone = "UTC", confidence = "exact" }
