[evidence.concurrency]
ownership = "Capture owns provider attempt and checkpoint admission; each business Context owns its aggregate transaction and outbox record; Platform owns generic execution, event delivery and schedule lease mechanics; Processes owns cross-context process state; Interfaces own only bounded adaptation and response composition."
bound = "Every provider/credential, stream, Dataset query, outbox/process and BFF/SSE surface declares finite 1x/10x-tested request/byte/item/batch/in-flight/connections/deadline/resource budgets; no unbounded queue, poller-per-client or payload-bearing event envelope is permitted."
ordering = "A command ingress idempotency claim and OperationReceipt precede its context transaction; aggregate state and outbox commit precede delivery lease; a consumer inbox claim precedes side effect and acknowledgement; immutable artifact receipt precedes Dataset build, Dataset release precedes Study rerun, and projection rebuild follows its authoritative event."
atomicity = "The Platform foundation supplies each aggregate transaction plus corresponding outbox record and consumer inbox/ack mechanics. Cross-context progress is eventually coordinated by events and Process state, never by a shared transaction or synchronous callback chain."
timeout_cancellation = "Platform execution assigns finite timeout and cancellation receipts; Capture retries are classified and bounded; process deadlines stop further retry; cancellation leaves committed artifacts and state auditable while downstream consumers observe explicit cancelled, blocked or unavailable results."
backpressure = "Capture rejects or defers intake at source policy limits, delivery batches admit finite work, Process Managers coalesce duplicate idempotency keys, and BFFs enforce bounded query windows without converting saturation into success."
partial_failure = "A capture group, Dataset build, outbox fan-out or Study rerun can complete partially; owners persist per-input/per-step outcome, do not advance a formal release/result incorrectly, and resume or compensate from durable state."
capacity_validation = "Temporary-root 1x/10x tests block provider ports, stream buffers, SQLite/Parquet/DuckDB queries, outbox consumers, multi-source joins, process steps and shared BFF/SSE fan-out to assert measured SLO/resource budgets, finite admission, retry/deadline behavior, idempotent recovery, fair replay, no duplicate commit and clear overload status."

