concurrency = 64
retry_classification = { max_attempts = 5, backoff = "exponential", retryable_classes = ["timeout", "rate_limit", "transient_5xx"] }
circuit_breaker = { failure_threshold = 5, cooldown_seconds = 300 }
bounded_queue_backpressure = { capacity = 10000, overflow = "reject", backpressure = true }
idempotency = { enabled = true, key_fields = ["source_id", "event_id", "publication_time", "revision_id", "payload_hash"], dedup_window_seconds = 2592000, persistence = "durable", conflict_policy = "upsert_newer_revision" }
poison_handling = "quarantine"
