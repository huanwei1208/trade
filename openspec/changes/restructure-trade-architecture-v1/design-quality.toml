revision_time = { source = "source_revision_time", fallback = "explicit_unavailable", timezone = "UTC", confidence = "exact" }
timestamp_confidence = "exact"
source_identity = { known = true, source_id = "capture-source-contract-v1", source_kind = "licensed_vendor" }
provenance = { status = "verified", source_id = "capture-source-contract-v1", reference = "source-manifest-v1" }
licensing = "approved"
availability_states = ["nonempty", "empty", "partial", "unavailable", "rate_limited", "invalid", "stale"]
quota = { amount = 1000000, unit = "requests", window_seconds = 86400 }
