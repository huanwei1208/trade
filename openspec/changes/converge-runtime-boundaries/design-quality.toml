  "one Web process-owned TradeDB, EventBus and workflow-command lifecycle",
  "FastAPI lifespan startup and shutdown",
  "one finite owner-level shutdown deadline",
  "retryable fail-closed cleanup",
]
failure_states = [
  "partial_start_failure",
  "resource_unavailable",
  "stopping",
  "stopped",
  "duplicate_cleanup",
  "command_owner_loss",
  "shutdown_retry",
  "shutdown_deadline_exceeded",
  "claim_heartbeat_live",
]
